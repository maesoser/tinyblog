<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tinyblog — Admin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <script>
    (function(){
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="admin-body">

<div class="admin-layout">
  <!-- Sidebar -->

      <a href="/" class="admin-nav-link" target="_blank" aria-label="View Blog">
        <!-- lucide: external-link -->
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>

      <svg class="icon-sun" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
      </svg>
      <svg class="icon-moon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
      </svg>
    </button>
  </aside>

  <!-- Mobile bottom nav -->
  <nav class="mobile-bottom-nav" aria-label="Admin navigation">
    <a href="/admin/" class="mobile-nav-item active" aria-label="Posts">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="M13 5h8M13 9h5M3 15h18M3 19h18"/></svg>
      <span>Posts</span>
    </a>
    <a href="/admin/editor.html" class="mobile-nav-item" aria-label="New Post">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg>
      <span>New</span>
    </a>
    <a href="/admin/settings.html" class="mobile-nav-item" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>Settings</span>
    </a>
    <a href="/" class="mobile-nav-item" target="_blank" aria-label="View Blog">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
      <span>Blog</span>
    </a>
    <button class="mobile-nav-item" id="mobileThemeToggle" aria-label="Toggle dark mode">
      <svg class="icon-sun" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
      <svg class="icon-moon" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
      <span>Theme</span>
    </button>
  </nav>

  <!-- Main content -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">Posts</h1>
      <a href="/admin/editor.html" class="btn btn-primary">+ New Post</a>
    </div>

    <!-- Filter tabs -->
    <div class="admin-tabs" id="filterTabs">
      <button class="tab-btn active" data-filter="all">All</button>
      <button class="tab-btn" data-filter="published">Published</button>
      <button class="tab-btn" data-filter="draft">Drafts</button>
    </div>

    <!-- Post list table -->
    <div class="admin-card" id="postsContainer">
      <p class="loading-text">Loading posts…</p>
    </div>
  </main>
</div>

<!-- Cloudflare Access error modal -->
<div class="modal-backdrop" id="accessErrorModal" hidden>
  <div class="modal">
    <h2 class="modal-title">Access Denied</h2>
    <p class="modal-body" id="accessErrorMsg"></p>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal-backdrop" id="deleteModal" hidden>
  <div class="modal">
    <h2 class="modal-title">Delete post?</h2>
    <p class="modal-body">This action cannot be undone. The post and all its assets will be permanently removed.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelDelete">Cancel</button>
      <button class="btn btn-danger" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<script>
  // ── Theme toggle ──────────────────────────────────────────────────────────
  function applyThemeToggle() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }
  document.getElementById('themeToggle').addEventListener('click', applyThemeToggle);
  document.getElementById('mobileThemeToggle').addEventListener('click', applyThemeToggle);

  // ── Cloudflare Access error modal ─────────────────────────────────────────
  function showAccessError(message) {
    document.getElementById('accessErrorMsg').textContent = message;
    document.getElementById('accessErrorModal').hidden = false;
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let allPosts = [];
  let currentFilter = 'all';
  let pendingDeleteId = null;

  // ── API helpers ───────────────────────────────────────────────────────────
  async function parseErrorResponse(res) {
    const text = await res.text().catch(() => '');
    console.error(`[tinyblog] API error ${res.status} ${res.url}:`, text);
    try { return JSON.parse(text); } catch { return { error: `HTTP ${res.status}` }; }
  }

  async function fetchPosts() {
    const res = await fetch('/api/posts');
    if (res.status === 403) {
      const err = await parseErrorResponse(res);
      showAccessError(err.error || 'Access denied.');
      return [];
    }
    return res.ok ? res.json() : [];
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function filterPosts(posts, filter) {
    if (filter === 'all') return posts;
    return posts.filter(p => p.status === filter);
  }

  function renderTable(posts) {
    const container = document.getElementById('postsContainer');
    if (posts.length === 0) {
      container.innerHTML = '<p class="empty-state">No posts found.</p>';
      return;
    }
    container.innerHTML = `
      <table class="admin-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Status</th>
            <th>Updated</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${posts.map(renderRow).join('')}
        </tbody>
      </table>`;
  }

  function renderRow(p) {
    const tags = (p.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
    const statusBadge = `<span class="badge badge-${p.status}">${p.status}</span>`;
    const date = new Date(p.updated_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
    return `
      <tr data-id="${p.id}">
        <td><a href="/posts/${encodeURIComponent(p.slug)}" target="_blank" class="post-link">${escHtml(p.title)}</a></td>
        <td>${escHtml(p.author)}</td>
        <td>${statusBadge}</td>
        <td class="muted">${date}</td>
        <td class="actions-cell">
          <button class="btn btn-sm btn-outline" onclick="location.href='/admin/editor.html?id=${p.id}'">Edit</button>
          ${p.status === 'draft'
            ? `<button class="btn btn-sm btn-primary" onclick="toggleStatus(${p.id},'publish')">Publish</button>`
            : `<button class="btn btn-sm btn-outline" onclick="toggleStatus(${p.id},'unpublish')">Unpublish</button>`}
          <button class="btn btn-sm btn-danger" onclick="openDeleteModal(${p.id})">Delete</button>
        </td>
      </tr>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  async function toggleStatus(id, action) {
    const res = await fetch(`/api/posts/${id}/${action}`, {
      method: 'POST',
    });
    if (res.ok) {
      allPosts = await fetchPosts();
      renderTable(filterPosts(allPosts, currentFilter));
    } else {
      const err = await parseErrorResponse(res);
      alert(err.error || 'Action failed');
    }
  }

  function openDeleteModal(id) {
    pendingDeleteId = id;
    document.getElementById('deleteModal').hidden = false;
  }

  document.getElementById('cancelDelete').addEventListener('click', () => {
    document.getElementById('deleteModal').hidden = true;
    pendingDeleteId = null;
  });

  document.getElementById('confirmDelete').addEventListener('click', async () => {
    if (!pendingDeleteId) return;
    const res = await fetch(`/api/posts/${pendingDeleteId}`, { method: 'DELETE' });
    document.getElementById('deleteModal').hidden = true;
    pendingDeleteId = null;
    if (!res.ok) {
      const err = await parseErrorResponse(res);
      alert(err.error || 'Delete failed');
      return;
    }
    allPosts = await fetchPosts();
    renderTable(filterPosts(allPosts, currentFilter));
  });

  // Close modal on backdrop click
  document.getElementById('deleteModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      e.currentTarget.hidden = true;
      pendingDeleteId = null;
    }
  });

  // ── Filter tabs ────────────────────────────────────────────────────────────
  document.getElementById('filterTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable(filterPosts(allPosts, currentFilter));
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  (async () => {
    // Load posts and site config in parallel
    [allPosts] = await Promise.all([
      fetchPosts(),
      fetch('/api/site-config')
        .then(r => r.ok ? r.json() : null)
        .then(cfg => { if (cfg?.blog_name) document.getElementById('sidebarLogo').textContent = cfg.blog_name; })
        .catch(() => {}),
    ]);
    renderTable(filterPosts(allPosts, currentFilter));
  })();
</script>
</body>
</html>
